<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SafePak Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
}

header {
  background: #0f172a;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.login-box {
  width: 320px;
  margin: 80px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: #0f172a;
  color: white;
  border: none;
  cursor: pointer;
}

.dashboard {
  display: none;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

table {
  width: 100%;
  background: white;
  margin-top: 15px;
  border-collapse: collapse;
}

th {
  background: #0f172a;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #ddd;
}

.active { color: green; font-weight: bold; }

.summary {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.summary div {
  flex: 1;
  background: white;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<header>SAFEPAK ADMIN DASHBOARD</header>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h3>Admin Login</h3>
  <input id="employeeNumber" placeholder="Employee Number (001)"/>
  <input id="password" type="password" placeholder="Password (2000)"/>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<!-- SUMMARY CARDS -->
<div class="summary" id="summary"></div>

<!-- SEARCH -->
<input 
  id="search" 
  placeholder="Search employee..." 
  oninput="filterTable()"
/>

<div class="grid">

  <!-- ADD EMPLOYEE -->
  <div class="card">
    <h3>Add Employee</h3>
    <input id="empNo" placeholder="Employee Number"/>
    <input id="fullName" placeholder="Full Name"/>
    <input id="role" placeholder="Role (Employee/Cleaner/Supervisor)"/>
    <input id="empPass" placeholder="Password"/>
    <button onclick="addEmployee()">Add Employee</button>
  </div>

  <!-- PAYROLL -->
  <div class="card">
    <h3>Payroll</h3>
    <input id="month" placeholder="Month (2026-06)"/>
    <button onclick="generatePayroll()">Generate Payroll</button>
  </div>

</div>

<!-- CHART -->
<div class="card">
  <canvas id="chart"></canvas>
</div>

<!-- ATTENDANCE TABLE -->
<table>
<thead>
<tr>
  <th>Emp No</th>
  <th>Name</th>
  <th>Role</th>
  <th>Shift</th>
  <th>Login</th>
  <th>Logout</th>
  <th>Minutes</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>

const API = "https://safepak-system-production.up.railway.app/api";
let token = localStorage.getItem("token");
let chart;
let allData = [];

/* ================= LOGIN ================= */
async function login(){
  const employeeNumber = document.getElementById("employeeNumber").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ employeeNumber, password })
  });

  const data = await res.json();

  if(data.token){
    token = data.token;
    localStorage.setItem("token", token);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadAttendance();
  } else {
    document.getElementById("msg").innerText = data.error;
  }
}

/* ================= AUTH FETCH ================= */
function authFetch(url){
  return fetch(url, {
    headers: {
      "Authorization": "Bearer " + token
    }
  });
}

/* ================= ATTENDANCE ================= */
async function loadAttendance(){
  const res = await authFetch(API + "/attendance");
  const data = await res.json();

  allData = data;

  renderTable(data);
  renderSummary(data);
  loadChart(data);
}

/* ================= TABLE ================= */
function renderTable(data){
  const table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach(e => {
    table.innerHTML += `
      <tr>
        <td>${e.employeeNumber}</td>
        <td>${e.fullName}</td>
        <td>${e.role}</td>
        <td>${e.shift}</td>
        <td>${e.loginTime}</td>
        <td>${e.logoutTime || '<span class="active">ACTIVE</span>'}</td>
        <td>${e.workedMinutes || 0}</td>
      </tr>
    `;
  });
}

/* ================= SEARCH FILTER ================= */
function filterTable(){
  const val = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(e =>
    (e.employeeNumber || "").toLowerCase().includes(val) ||
    (e.fullName || "").toLowerCase().includes(val) ||
    (e.role || "").toLowerCase().includes(val)
  );

  renderTable(filtered);
}

/* ================= SUMMARY ================= */
function renderSummary(data){
  const total = data.length;
  const active = data.filter(d => !d.logoutTime).length;
  const completed = total - active;

  document.getElementById("summary").innerHTML = `
    <div>Total: ${total}</div>
    <div>Active: ${active}</div>
    <div>Completed: ${completed}</div>
  `;
}

/* ================= CHART ================= */
function loadChart(data){

  const total = data.length;
  const active = data.filter(d => !d.logoutTime).length;
  const completed = total - active;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Total","Active","Completed"],
      datasets: [{
        label: "Attendance",
        data: [total, active, completed]
      }]
    }
  });
}

/* ================= ADD EMPLOYEE ================= */
async function addEmployee(){

  const body = {
    employeeNumber: empNo.value,
    fullName: fullName.value,
    role: role.value,
    password: empPass.value
  };

  const res = await fetch(API + "/employees", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify(body)
  });

  alert((await res.json()).message);
}

/* ================= PAYROLL ================= */
async function generatePayroll(){

  const month = document.getElementById("month").value;

  const res = await authFetch(API + "/payroll/" + month);

  const data = await res.json();

  alert("Payroll generated for " + data.length + " employees");
}

</script>

</body>
</html>
