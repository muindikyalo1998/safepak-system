<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Safepak System</title>

  <!-- CHART JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f1f5f9;
    }

    header{
      background:#0f172a;
      color:white;
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .login-box{
      width:350px;
      background:white;
      margin:80px auto;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .login-box h2{
      text-align:center;
      margin-bottom:20px;
    }

    .login-box input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:5px;
      box-sizing:border-box;
    }

    .login-box button{
      width:100%;
      padding:12px;
      margin-top:15px;
      background:#0f172a;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

    .login-box button:hover{
      background:#1e293b;
    }

    #msg{
      text-align:center;
      margin-top:15px;
      color:red;
      font-weight:bold;
    }

    .container{
      display:none;
      padding:20px;
    }

    .top-buttons{
      margin-bottom:20px;
    }

    .top-buttons button{
      padding:10px 15px;
      margin-right:10px;
      border:none;
      background:#0f172a;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    .top-buttons button:hover{
      background:#1e293b;
    }

    .chart-box{
      background:white;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
      box-shadow:0 0 5px rgba(0,0,0,0.1);
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius:10px;
      overflow:hidden;
    }

    table th{
      background:#0f172a;
      color:white;
      padding:12px;
    }

    table td{
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    .active{
      color:green;
      font-weight:bold;
    }

  </style>
</head>

<body>

<header>
  Safepak Management System
</header>

<!-- LOGIN -->
<div class="login-box">

  <h2>Safepak System Login</h2>

  <input
    type="text"
    id="employeeNumber"
    placeholder="Employee Number"
  />

  <input
    type="password"
    id="password"
    placeholder="Password"
  />

  <button onclick="login()">
    Login
  </button>

  <p id="msg"></p>

</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard">

  <h2>Attendance Dashboard</h2>

  <div class="top-buttons">

    <button onclick="loadAttendance()">
      Refresh Attendance
    </button>

    <button onclick="generatePayroll()">
      Generate Payroll
    </button>

    <button onclick="downloadPayslip()">
      Download Payslip PDF
    </button>

  </div>

  <!-- CHART -->
  <div class="chart-box">

    <canvas id="attendanceChart"></canvas>

  </div>

  <!-- TABLE -->
  <table>

    <thead>
      <tr>
        <th>Emp No</th>
        <th>Name</th>
        <th>Role</th>
        <th>Shift</th>
        <th>Login</th>
        <th>Logout</th>
        <th>Minutes</th>
        <th>Hours</th>
      </tr>
    </thead>

    <tbody id="attendanceTable"></tbody>

  </table>

</div>

<script>

const API = "http://localhost:5000/api";

let attendanceChart;

/* ================= LOGIN ================= */

async function login(){

  const employeeNumber =
    document.getElementById("employeeNumber").value;

  const password =
    document.getElementById("password").value;

  try{

    const res = await fetch(API + "/login",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        employeeNumber,
        password
      })
    });

    const data = await res.json();

    if(data.token){

      localStorage.setItem("token", data.token);

      document.querySelector(".login-box").style.display = "none";

      document.getElementById("dashboard").style.display = "block";

      // AUTO LOAD
      loadAttendance();
      loadChart();

    }else{

      document.getElementById("msg").innerHTML =
        data.error || "Login failed";
    }

  }catch(err){

    console.log(err);

    document.getElementById("msg").innerHTML =
      "Server connection error";
  }
}

/* ================= LOAD ATTENDANCE ================= */

async function loadAttendance(){

  try{

    const res = await fetch(API + "/attendance");

    const data = await res.json();

    const table =
      document.getElementById("attendanceTable");

    table.innerHTML = "";

    data.forEach(emp => {

      table.innerHTML += `
        <tr>
          <td>${emp.employeeNumber}</td>
          <td>${emp.fullName}</td>
          <td>${emp.role}</td>
          <td>${emp.shift || "-"}</td>
          <td>${emp.loginTime || "-"}</td>
          <td>
            ${
              emp.logoutTime
              ? emp.logoutTime
              : '<span class="active">ACTIVE</span>'
            }
          </td>
          <td>${emp.workedMinutes || 0}</td>
          <td>${emp.workedHours || 0}</td>
        </tr>
      `;
    });

  }catch(err){
    console.log(err);
  }
}

/* ================= CHART ================= */

async function loadChart(){

  try{

    const res = await fetch(
      API + "/attendance/summary"
    );

    const data = await res.json();

    const ctx =
      document.getElementById("attendanceChart");

    if(attendanceChart){
      attendanceChart.destroy();
    }

    attendanceChart = new Chart(ctx, {

      type:"bar",

      data:{
        labels:[
          "Total",
          "Active",
          "Completed"
        ],

        datasets:[{
          label:"Attendance Overview",

          data:[
            data.total,
            data.active,
            data.completed
          ]
        }]
      },

      options:{
        responsive:true
      }

    });

  }catch(err){
    console.log(err);
  }
}

/* ================= PAYROLL ================= */

async function generatePayroll(){

  const month = prompt(
    "Enter payroll month (Example: 2026-05)"
  );

  if(!month) return;

  try{

    const res = await fetch(
      API + "/payroll/generate/" + month
    );

    const data = await res.json();

    alert(data.message);

  }catch(err){
    console.log(err);
  }
}

/* ================= PAYSLIP ================= */

function downloadPayslip(){

  const employeeNumber =
    prompt("Enter Employee Number");

  const month =
    prompt("Enter Month (Example: 2026-05)");

  if(!employeeNumber || !month) return;

  window.open(
    API +
    "/payroll/payslip/" +
    employeeNumber +
    "/" +
    month,
    "_blank"
  );
}

</script>

</body>
</html>
